<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RAG Chat</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; padding: 0; }
    header { padding: 16px 20px; border-bottom: 1px solid #e5e5e5; display:flex; gap:12px; align-items:center; }
    header h1 { font-size: 16px; margin: 0; }
    header .muted { color:#666; font-size: 13px; }
    main { padding: 16px 20px; max-width: 980px; margin: 0 auto; }
    .row { display:flex; gap: 10px; align-items:flex-start; }
    textarea { width: 100%; min-height: 70px; resize: vertical; padding: 10px; font-size: 14px; }
    button { padding: 10px 14px; font-size: 14px; cursor:pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .panel { border: 1px solid #e5e5e5; border-radius: 10px; padding: 12px; margin-top: 14px; }
    .chatlog { white-space: pre-wrap; line-height: 1.35; }
    .answer { white-space: pre-wrap; line-height: 1.35; }
    .kilder ul { margin: 8px 0 0 18px; padding: 0; }
    .kilder li { margin: 6px 0; }
    .badge { display:inline-block; padding: 2px 8px; border: 1px solid #ddd; border-radius: 999px; font-size: 12px; color:#333; }
    .split { display:grid; grid-template-columns: 2fr 1fr; gap: 12px; }
    @media (max-width: 900px) { .split { grid-template-columns: 1fr; } }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
    .hint { margin-top:8px; padding:10px 12px; border-radius:10px; border:1px solid #d9e7ff; background:#f5f9ff; color:#163963; font-size:13px; line-height:1.35; }
    .hint strong { display:block; margin-bottom:4px; }
    .hint button { margin-top:8px; padding:6px 10px; font-size:13px; }
    .hidden { display:none; }
    .quick-actions { margin-top: 14px; }
    .actions-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
    .action-card { border:1px solid #e5e5e5; border-radius:10px; padding:10px; background:#fafafa; }
    .action-card strong { display:block; margin-bottom:4px; font-size:14px; }
    .action-card .muted { display:block; margin-bottom:8px; }
    .action-card button { padding:6px 10px; font-size:13px; }
  </style>
</head>
<body>
  <header>
    <h1>RAG Chat</h1>
    <span class="badge" id="status">klar</span>
    <span class="muted">/v1/chat/stream (SSE)</span>
    <span class="muted" style="margin-left:auto;">Tips: se også <a href="/docs">/docs</a></span>
  </header>

  <main>
    <div class="row">
      <div style="min-width:220px;">
        <label for="caseId" class="muted" style="display:block; margin-bottom:6px;">Case</label>
        <select id="caseId" style="width:100%; padding:10px; font-size:14px;">
          <option value="">standard</option>
        </select>
        <div id="caseMeta" class="hint hidden"></div>
      </div>
      <textarea id="q" placeholder="Skriv spørsmålet ditt her..."></textarea>
      <div style="display:flex; flex-direction:column; gap:8px;">
        <button id="send">Send</button>
        <button id="stop" disabled>Stopp</button>
      </div>
    </div>
    <div id="queryHint" class="hint hidden"></div>
    <div id="quickActions" class="panel quick-actions hidden">
      <div class="row" style="justify-content:space-between; align-items:center;">
        <strong>Hurtigvalg</strong>
        <span class="muted mono">setter inn dokumenterte startspørsmål</span>
      </div>
      <div id="quickActionsGrid" class="actions-grid" style="margin-top:10px;"></div>
    </div>

    <div class="split">
      <div class="panel">
        <div class="row" style="justify-content:space-between; align-items:center;">
          <strong>Svar</strong>
          <span class="muted mono" id="mode">streaming</span>
        </div>
        <div class="answer" id="answer"></div>
      </div>

      <div class="panel kilder">
        <div class="row" style="justify-content:space-between; align-items:center;">
          <strong>Kilder</strong>
          <span class="muted mono" id="citCount">0</span>
        </div>
        <ul id="citations"></ul>
      </div>
    </div>

    <div class="panel">
      <div class="row" style="justify-content:space-between; align-items:center;">
        <strong>Debug</strong>
        <span class="muted mono">SSE events: query_plan, status, citations, delta, done</span>
      </div>
      <div class="chatlog mono" id="debug"></div>
    </div>
  </main>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const q = $("q");
  const sendBtn = $("send");
  const stopBtn = $("stop");
  const caseIdEl = $("caseId");
  const answerEl = $("answer");
  const citationsEl = $("citations");
  const statusEl = $("status");
  const debugEl = $("debug");
  const citCountEl = $("citCount");
  const modeEl = $("mode");
  const caseMetaEl = $("caseMeta");
  const queryHintEl = $("queryHint");
  const quickActionsEl = $("quickActions");
  const quickActionsGridEl = $("quickActionsGrid");

  let aborter = null;
  let caseMap = new Map();

  function setStatus(text) {
    statusEl.textContent = text;
  }

  function logDebug(line) {
    debugEl.textContent += line + "\n";
    debugEl.scrollTop = debugEl.scrollHeight;
  }

  function clearUI() {
    answerEl.textContent = "";
    citationsEl.innerHTML = "";
    debugEl.textContent = "";
    citCountEl.textContent = "0";
    modeEl.textContent = "streaming";
    queryHintEl.classList.add("hidden");
    queryHintEl.innerHTML = "";
  }

  function escapeHtml(s) {
    return String(s)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function renderCitations(citations) {
    citationsEl.innerHTML = "";
    citCountEl.textContent = String(citations.length);
    citations.forEach((c, idx) => {
      const li = document.createElement("li");
      const title = (c.title || "(uten tittel)");
      const meta = [
        c.author ? c.author : null,
        c.year ? String(c.year) : null,
        c.source_type ? String(c.source_type) : null
      ].filter(Boolean).join(" · ");

      const score = (typeof c.score === "number") ? c.score.toFixed(3) : "";
      const download = c.download_url
        ? ` · <a href="${escapeHtml(c.download_url)}" target="_blank" rel="noopener">last ned</a>`
        : "";

      li.innerHTML = `<div><strong>[${idx+1}]</strong> ${escapeHtml(title)}</div>
                      <div class="muted mono">${escapeHtml(meta)}${meta && score ? " · " : ""}${score ? "score=" + score : ""}${download}</div>
                      <div class="mono" style="margin-top:4px;">${escapeHtml(c.excerpt || "").slice(0, 500)}${(c.excerpt && c.excerpt.length>500) ? "…" : ""}</div>`;
      citationsEl.appendChild(li);
    });
  }



  function renderCaseOptions(cases) {
    const requested = new URLSearchParams(window.location.search).get("case_id") || "";
    cases.forEach((item) => {
      caseMap.set(item.case_id, item);
      const opt = document.createElement("option");
      opt.value = item.case_id;
      opt.textContent = item.description ? `${item.case_id} · ${item.description}` : item.case_id;
      if (item.case_id === requested) opt.selected = true;
      caseIdEl.appendChild(opt);
    });
    renderCaseMeta();
    renderQuickActions();
    renderQueryHint();
  }

  function looksLikeCompositionQuestion(message) {
    const text = String(message || "").toLowerCase();
    if (!text.trim()) return false;
    const phrases = [
      "sette sammen",
      "sett sammen",
      "hvordan kan jeg sette sammen",
      "hvordan setter jeg sammen",
      "valg av byggesteiner",
      "brukeroppsett",
    ];
    if (phrases.some((phrase) => text.includes(phrase))) return true;
    const words = new Set((text.match(/\w+/g) || []));
    let hits = 0;
    [
      "arbeidsrom",
      "workspace",
      "komponent",
      "komponenter",
      "byggestein",
      "byggesteiner",
      "celle",
      "celler",
      "oppsett",
      "sammensette",
      "sammensetning",
    ].forEach((word) => {
      if (words.has(word)) hits += 1;
    });
    return hits >= 2;
  }

  function renderCaseMeta() {
    const selected = caseMap.get(caseIdEl.value || "");
    if (!selected || (!selected.intended_for && !selected.use_when && !selected.avoid_when)) {
      caseMetaEl.classList.add("hidden");
      caseMetaEl.innerHTML = "";
      return;
    }
    const parts = [];
    if (selected.intended_for) parts.push(`<strong>Dette caset er for</strong>${escapeHtml(selected.intended_for)}`);
    if (selected.use_when) parts.push(`<div><span class="muted">Bruk når:</span> ${escapeHtml(selected.use_when)}</div>`);
    if (selected.avoid_when) parts.push(`<div><span class="muted">Unngå når:</span> ${escapeHtml(selected.avoid_when)}</div>`);
    caseMetaEl.innerHTML = parts.join("");
    caseMetaEl.classList.remove("hidden");
  }

  function renderQuickActions() {
    const selected = caseMap.get(caseIdEl.value || "");
    const actions = Array.isArray(selected?.quick_actions) ? selected.quick_actions : [];
    if (!actions.length) {
      quickActionsEl.classList.add("hidden");
      quickActionsGridEl.innerHTML = "";
      return;
    }

    quickActionsGridEl.innerHTML = "";
    actions.forEach((action) => {
      const card = document.createElement("div");
      card.className = "action-card";
      card.innerHTML = `
        <strong>${escapeHtml(action.label || "Hurtigvalg")}</strong>
        <span class="muted">${escapeHtml(action.description || "")}</span>
        <button type="button">Bruk</button>
      `;
      const btn = card.querySelector("button");
      btn.onclick = () => {
        q.value = String(action.prompt || "");
        q.focus();
        renderQueryHint();
      };
      quickActionsGridEl.appendChild(card);
    });
    quickActionsEl.classList.remove("hidden");
  }

  function renderQueryHint(fromServer) {
    const selected = caseMap.get(caseIdEl.value || "");
    const needsCompositionHint = caseIdEl.value === "dimy_docs" && looksLikeCompositionQuestion(q.value);
    if (!needsCompositionHint && !fromServer) {
      queryHintEl.classList.add("hidden");
      queryHintEl.innerHTML = "";
      return;
    }
    const suggestedCaseId = (fromServer && fromServer.suggested_case_id)
      || (selected && selected.preferred_alternative_case_id)
      || "dimy_prompts";
    const message = (fromServer && fromServer.message)
      || "Dette spørsmålet ser ut som brukerrettet cellesammensetning. Bruk dimy_prompts for arbeidsrom, byggesteiner og dokumenterte oppskrifter.";
    queryHintEl.innerHTML = `<strong>Case-hint</strong>${escapeHtml(message)}
      <div><button type="button" id="switchSuggestedCase">Bytt til ${escapeHtml(suggestedCaseId)}</button></div>`;
    queryHintEl.classList.remove("hidden");
    const btn = $("switchSuggestedCase");
    if (btn) {
      btn.onclick = () => {
        caseIdEl.value = suggestedCaseId;
        renderCaseMeta();
        renderQuickActions();
        renderQueryHint();
      };
    }
  }

  async function loadCases() {
    try {
      const res = await fetch("/v1/cases");
      if (!res.ok) return;
      const payload = await res.json();
      renderCaseOptions(Array.isArray(payload.cases) ? payload.cases : []);
    } catch (_err) {
      // UI should still work without explicit case listing.
    }
  }

  async function sendStreaming() {
    const message = q.value.trim();
    if (!message) return;

    clearUI();
    setStatus("sender…");
    sendBtn.disabled = true;
    stopBtn.disabled = false;

    aborter = new AbortController();

    const res = await fetch("/v1/chat/stream", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Accept": "text/event-stream",
      },
      body: JSON.stringify({ message, case_id: caseIdEl.value || null }),
      signal: aborter.signal,
    });

    if (!res.ok) {
      const txt = await res.text();
      setStatus("feil");
      sendBtn.disabled = false;
      stopBtn.disabled = true;
      throw new Error(txt || ("HTTP " + res.status));
    }

    setStatus("streamer…");

    const reader = res.body.getReader();
    const decoder = new TextDecoder("utf-8");

    let buffer = "";
    let currentEvent = null;
    let dataLines = [];

    function flushEvent() {
      if (!dataLines.length) return;
      const data = dataLines.join("\n");
      const ev = currentEvent || "message";

      logDebug(`event=${ev} bytes=${data.length}`);

      if (ev === "citations") {
        try {
          const citations = JSON.parse(data);
          renderCitations(citations);
        } catch (e) {
          logDebug("citations parse error: " + e);
        }
      } else if (ev === "query_plan") {
        try {
          const obj = JSON.parse(data);
          const parts = [
            obj.selected_case || "ingen-case",
            obj.answer_mode || "standard",
            obj.streaming_allowed === false ? "ikke-stream" : "stream",
          ];
          modeEl.textContent = parts.join(" · ");
          if (obj.streaming_allowed === false) {
            setStatus("arbeider …");
          }
          renderQueryHint(obj.case_guidance || null);
        } catch (e) {
          logDebug("query_plan parse error: " + e);
        }
      } else if (ev === "status") {
        try {
          const obj = JSON.parse(data);
          setStatus(obj.message || "arbeider …");
        } catch (e) {
          setStatus("arbeider …");
        }
      } else if (ev === "delta") {
        try {
          const obj = JSON.parse(data);
          if (obj && typeof obj.delta === "string") {
            answerEl.textContent += obj.delta;
          }
        } catch (e) {
          // fallback if server ever sends raw text
          answerEl.textContent += data;
        }
      } else if (ev === "done") {
        setStatus("ferdig");
        sendBtn.disabled = false;
        stopBtn.disabled = true;
      } else if (ev === "error") {
        debugLog("SSE error: " + data);
        try {
          const obj = JSON.parse(data);
          debugLog("SSE error parsed: " + JSON.stringify(obj, null, 2));
          answerEl.textContent = "Feil: " + (obj.message || data);
        } catch (e) {
          answerEl.textContent = "Feil: " + data;
        }
        setStatus("feil");
        sendBtn.disabled = false;
        stopBtn.disabled = true;
      }
      currentEvent = null;
      dataLines = [];
    }

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      let idx;
      while ((idx = buffer.indexOf("\n")) !== -1) {
        const line = buffer.slice(0, idx);
        buffer = buffer.slice(idx + 1);
        const trimmed = line.replace(/\r$/, "");

        if (trimmed === "") {
          flushEvent();
          continue;
        }
        if (trimmed.startsWith("event:")) {
          currentEvent = trimmed.slice(6).trim();
          continue;
        }
        if (trimmed.startsWith("data:")) {
          dataLines.push(trimmed.slice(5).trim());
          continue;
        }
      }
    }

    flushEvent();

    if (stopBtn.disabled === false) {
      setStatus("ferdig");
      sendBtn.disabled = false;
      stopBtn.disabled = true;
    }
  }

  sendBtn.addEventListener("click", async () => {
    try {
      await sendStreaming();
    } catch (e) {
      answerEl.textContent = "Feil: " + (e?.message || e);
      setStatus("feil");
      sendBtn.disabled = false;
      stopBtn.disabled = true;
    }
  });

  stopBtn.addEventListener("click", () => {
    if (aborter) aborter.abort();
    aborter = null;
    setStatus("stoppet");
    sendBtn.disabled = false;
    stopBtn.disabled = true;
  });

  // ctrl/cmd + enter to send
  q.addEventListener("keydown", (ev) => {
    if ((ev.ctrlKey || ev.metaKey) && ev.key === "Enter") {
      sendBtn.click();
    }
  });

  q.addEventListener("input", () => {
    renderQueryHint();
  });

  caseIdEl.addEventListener("change", () => {
    renderCaseMeta();
    renderQuickActions();
    renderQueryHint();
  });

  loadCases();
})();

function debugLog(msg) {
  const el = document.getElementById("debug");
  if (el) {
    el.textContent += msg + "\n";
  }
  console.log(msg);
}
</script>
</body>
</html>
