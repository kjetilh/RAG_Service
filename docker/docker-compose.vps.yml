x-api-common-env: &api_common_env
  APP_ENV: ${APP_ENV:-prod}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
  LLM_PROVIDER: ${LLM_PROVIDER:-openai_compat}
  NEXT_GEN_RAG_ENABLED: ${NEXT_GEN_RAG_ENABLED:-false}
  RAG_CASES_PATH: ${RAG_CASES_PATH:-config/rag_cases.yml}
  TOP_K_VECTOR: ${TOP_K_VECTOR:-50}
  TOP_K_LEXICAL: ${TOP_K_LEXICAL:-50}
  TOP_K_FINAL: ${TOP_K_FINAL:-12}
  MAX_CHUNKS_PER_DOC: ${MAX_CHUNKS_PER_DOC:-3}
  QUERY_REWRITE_ENABLED: ${QUERY_REWRITE_ENABLED:-true}
  RERANKER_ENABLED: ${RERANKER_ENABLED:-false}
  RERANKER_MODEL: ${RERANKER_MODEL:-cross-encoder/ms-marco-MiniLM-L-6-v2}
  GROUNDING_MIN_CITATIONS: ${GROUNDING_MIN_CITATIONS:-2}
  STREAM_CHUNK_CHARS: ${STREAM_CHUNK_CHARS:-80}
  SYNC_TOMBSTONE_ENABLED: ${SYNC_TOMBSTONE_ENABLED:-false}
  SYNC_TOMBSTONE_GRACE_SECONDS: ${SYNC_TOMBSTONE_GRACE_SECONDS:-900}
  SYNC_ANTI_THRASH_BATCH_SIZE: ${SYNC_ANTI_THRASH_BATCH_SIZE:-200}

services:
  rag_innovasjon_db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${RAG_INNOVASJON_POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${RAG_INNOVASJON_POSTGRES_PASSWORD:-rag}
      POSTGRES_DB: ${RAG_INNOVASJON_POSTGRES_DB:-rag_innovasjon}
    volumes:
      - rag_innovasjon_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RAG_INNOVASJON_POSTGRES_USER:-rag} -d ${RAG_INNOVASJON_POSTGRES_DB:-rag_innovasjon}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - rag_innovasjon_net

  rag_innovasjon_api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    environment:
      <<: *api_common_env
      DATABASE_URL: postgresql+psycopg://${RAG_INNOVASJON_POSTGRES_USER:-rag}:${RAG_INNOVASJON_POSTGRES_PASSWORD:-rag}@rag_innovasjon_db:5432/${RAG_INNOVASJON_POSTGRES_DB:-rag_innovasjon}
      LLM_BASE_URL: ${RAG_INNOVASJON_LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_API_KEY: ${RAG_INNOVASJON_LLM_API_KEY:-}
      LLM_MODEL: ${RAG_INNOVASJON_LLM_MODEL:-gpt-4o-mini}
      LLM_PROFILES_JSON: ${RAG_INNOVASJON_LLM_PROFILES_JSON:-}
      SYSTEM_PERSONA_PATH: ${RAG_INNOVASJON_SYSTEM_PERSONA_PATH:-/app/prompts/system_persona.md}
      ANSWER_TEMPLATE_PATH: ${RAG_INNOVASJON_ANSWER_TEMPLATE_PATH:-/app/prompts/answer_template.md}
      INSTANCE_CASE_IDS_JSON: '${RAG_INNOVASJON_INSTANCE_CASE_IDS_JSON:-}'
      QUERY_ROUTER_ENABLED: '${RAG_INNOVASJON_QUERY_ROUTER_ENABLED:-false}'
      QUERY_ROUTER_DOCS_SOURCE_TYPES_JSON: '${RAG_INNOVASJON_QUERY_ROUTER_DOCS_SOURCE_TYPES_JSON:-}'
      QUERY_ROUTER_PROMPTS_SOURCE_TYPES_JSON: '${RAG_INNOVASJON_QUERY_ROUTER_PROMPTS_SOURCE_TYPES_JSON:-}'
      QUERY_ROUTER_DOCS_KEYWORDS_JSON: '${RAG_INNOVASJON_QUERY_ROUTER_DOCS_KEYWORDS_JSON:-}'
      QUERY_ROUTER_PROMPTS_KEYWORDS_JSON: '${RAG_INNOVASJON_QUERY_ROUTER_PROMPTS_KEYWORDS_JSON:-}'
      ADMIN_API_KEY: ${RAG_INNOVASJON_ADMIN_API_KEY:-}
      RESEARCH_API_TOKENS_JSON: '${RAG_INNOVASJON_RESEARCH_API_TOKENS_JSON:-}'
      RESEARCH_DOWNLOAD_SIGNING_KEY: ${RAG_INNOVASJON_RESEARCH_DOWNLOAD_SIGNING_KEY:-}
      RESEARCH_DOWNLOAD_TTL_SECONDS: ${RAG_INNOVASJON_RESEARCH_DOWNLOAD_TTL_SECONDS:-300}
      CELL_ACCESS_CONTROL_ENABLED: '${RAG_INNOVASJON_CELL_ACCESS_CONTROL_ENABLED:-false}'
      CELL_GATEWAY_SHARED_SECRET: '${RAG_INNOVASJON_CELL_GATEWAY_SHARED_SECRET:-}'
      CELL_OWNER_USER_IDS_JSON: '${RAG_INNOVASJON_CELL_OWNER_USER_IDS_JSON:-[]}'
      INGEST_ROOT: /data/uploads
    depends_on:
      rag_innovasjon_db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${RAG_INNOVASJON_API_PORT:-8101}:8000"
    volumes:
      - ${RAG_INNOVASJON_UPLOADS_DIR:-../uploads/innovasjon}:/data/uploads
    command:
      - /bin/sh
      - -c
      - python -m scripts.rebuild_index && uvicorn app.main:app --host 0.0.0.0 --port 8000
    networks:
      - rag_innovasjon_net
      - scaffold_shared

  rag_dimy_db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${RAG_DIMY_POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${RAG_DIMY_POSTGRES_PASSWORD:-rag}
      POSTGRES_DB: ${RAG_DIMY_POSTGRES_DB:-rag_dimy}
    volumes:
      - rag_dimy_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RAG_DIMY_POSTGRES_USER:-rag} -d ${RAG_DIMY_POSTGRES_DB:-rag_dimy}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - rag_dimy_net

  rag_dimy_api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    environment:
      <<: *api_common_env
      DATABASE_URL: postgresql+psycopg://${RAG_DIMY_POSTGRES_USER:-rag}:${RAG_DIMY_POSTGRES_PASSWORD:-rag}@rag_dimy_db:5432/${RAG_DIMY_POSTGRES_DB:-rag_dimy}
      LLM_BASE_URL: ${RAG_DIMY_LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_API_KEY: ${RAG_DIMY_LLM_API_KEY:-}
      LLM_MODEL: ${RAG_DIMY_LLM_MODEL:-gpt-4o-mini}
      LLM_PROFILES_JSON: ${RAG_DIMY_LLM_PROFILES_JSON:-}
      SYSTEM_PERSONA_PATH: ${RAG_DIMY_SYSTEM_PERSONA_PATH:-/app/prompts/system_persona_dimy.md}
      ANSWER_TEMPLATE_PATH: ${RAG_DIMY_ANSWER_TEMPLATE_PATH:-/app/prompts/answer_template_dimy.md}
      INSTANCE_CASE_IDS_JSON: '${RAG_DIMY_INSTANCE_CASE_IDS_JSON:-}'
      QUERY_ROUTER_ENABLED: '${RAG_DIMY_QUERY_ROUTER_ENABLED:-true}'
      QUERY_ROUTER_DOCS_SOURCE_TYPES_JSON: '${RAG_DIMY_QUERY_ROUTER_DOCS_SOURCE_TYPES_JSON:-["haven_docs","cellprotocol_docs"]}'
      QUERY_ROUTER_PROMPTS_SOURCE_TYPES_JSON: '${RAG_DIMY_QUERY_ROUTER_PROMPTS_SOURCE_TYPES_JSON:-["dimy_prompts","prompt_docs"]}'
      QUERY_ROUTER_DOCS_KEYWORDS_JSON: '${RAG_DIMY_QUERY_ROUTER_DOCS_KEYWORDS_JSON:-["api","endpoint","kode","code","implementasjon","implementation","arkitektur","architecture","database","postgres","docker","deploy","sync","ingest","test","feil","error","bug"]}'
      QUERY_ROUTER_PROMPTS_KEYWORDS_JSON: '${RAG_DIMY_QUERY_ROUTER_PROMPTS_KEYWORDS_JSON:-["prompt","prompts","promptmal","system prompt","systeminstruksjon","instruksjon","instruction","template","mal","policy","agent"]}'
      ADMIN_API_KEY: ${RAG_DIMY_ADMIN_API_KEY:-}
      RESEARCH_API_TOKENS_JSON: '${RAG_DIMY_RESEARCH_API_TOKENS_JSON:-}'
      RESEARCH_DOWNLOAD_SIGNING_KEY: ${RAG_DIMY_RESEARCH_DOWNLOAD_SIGNING_KEY:-}
      RESEARCH_DOWNLOAD_TTL_SECONDS: ${RAG_DIMY_RESEARCH_DOWNLOAD_TTL_SECONDS:-300}
      CELL_ACCESS_CONTROL_ENABLED: '${RAG_DIMY_CELL_ACCESS_CONTROL_ENABLED:-false}'
      CELL_GATEWAY_SHARED_SECRET: '${RAG_DIMY_CELL_GATEWAY_SHARED_SECRET:-}'
      CELL_OWNER_USER_IDS_JSON: '${RAG_DIMY_CELL_OWNER_USER_IDS_JSON:-[]}'
      INGEST_ROOT: /data/uploads
    depends_on:
      rag_dimy_db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${RAG_DIMY_API_PORT:-8102}:8000"
    volumes:
      - ${RAG_DIMY_UPLOADS_DIR:-../uploads/dimy}:/data/uploads
    command:
      - /bin/sh
      - -c
      - python -m scripts.rebuild_index && uvicorn app.main:app --host 0.0.0.0 --port 8000
    networks:
      - rag_dimy_net
      - scaffold_shared

volumes:
  rag_innovasjon_pgdata:
  rag_dimy_pgdata:

networks:
  rag_innovasjon_net:
    internal: true
  rag_dimy_net:
    internal: true
  scaffold_shared:
    external: true
    name: ${SCAFFOLD_SHARED_NETWORK:-scaffold_shared}
