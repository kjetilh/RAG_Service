services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag}
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - rag_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_DB:-ragdb}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-rag}:${POSTGRES_PASSWORD:-rag}@db:5432/${POSTGRES_DB:-ragdb}
      APP_ENV: ${APP_ENV:-prod}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai_compat}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      TOP_K_VECTOR: ${TOP_K_VECTOR:-50}
      TOP_K_LEXICAL: ${TOP_K_LEXICAL:-50}
      TOP_K_FINAL: ${TOP_K_FINAL:-12}
      MAX_CHUNKS_PER_DOC: ${MAX_CHUNKS_PER_DOC:-3}
      QUERY_REWRITE_ENABLED: ${QUERY_REWRITE_ENABLED:-true}
      RERANKER_ENABLED: ${RERANKER_ENABLED:-false}
      RERANKER_MODEL: ${RERANKER_MODEL:-cross-encoder/ms-marco-MiniLM-L-6-v2}
      GROUNDING_MIN_CITATIONS: ${GROUNDING_MIN_CITATIONS:-2}
      STREAM_CHUNK_CHARS: ${STREAM_CHUNK_CHARS:-80}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    command:
      - /bin/sh
      - -c
      - python -m scripts.rebuild_index && uvicorn app.main:app --host 0.0.0.0 --port 8000
volumes:
  rag_pgdata:
