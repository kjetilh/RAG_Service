version: 1
default_case: dimy_docs
cases:
  - case_id: dimy_docs
    description: Dokumentasjon og kodebruk for HAVEN/CellProtocol/CellScaffold.
    enabled: true
    planner:
      docs_source_types: ["haven_docs", "cellprotocol_docs"]
      prompts_source_types: ["dimy_prompts", "prompt_docs"]
      docs_keywords: ["api", "endpoint", "kode", "code", "arkitektur", "architecture", "sync", "ingest", "deploy", "database"]
      prompt_keywords: ["prompt", "prompts", "promptmal", "system prompt", "systeminstruksjon", "instruction", "template", "mal", "agent", "policy"]
      default_domain: docs
    retrieval:
      top_k_vector: 50
      top_k_lexical: 50
      top_k_final: 12
      max_chunks_per_doc: 3
    evaluation:
      min_citations: 2
      min_unique_docs: 1
      min_avg_score: 0.0
      enforce: false
  - case_id: innovasjon
    description: Innovasjonsledelse og immovasjonsfag.
    enabled: true
    planner:
      docs_source_types: ["innovasjonsledelse", "immovasjonsfag"]
      prompts_source_types: []
      docs_keywords: ["policy", "innovation", "innovasjon", "mission", "governance"]
      prompt_keywords: []
      default_domain: docs
    retrieval:
      top_k_vector: 50
      top_k_lexical: 50
      top_k_final: 12
      max_chunks_per_doc: 3
    evaluation:
      min_citations: 2
      min_unique_docs: 1
      min_avg_score: 0.0
      enforce: false
  - case_id: innovasjon_intervjuer
    description: Lederintervjuer for bokprosjektet (kollektiv mening per fast spørsmål).
    enabled: true
    planner:
      docs_source_types: ["innovasjon_intervju_transcript"]
      prompts_source_types: []
      docs_keywords: ["intervju", "leder", "spørsmål", "svar", "kultur", "barriere", "drivkraft", "måling"]
      prompt_keywords: []
      default_domain: docs
    retrieval:
      top_k_vector: 60
      top_k_lexical: 60
      top_k_final: 14
      max_chunks_per_doc: 4
    prompt_profile:
      system_persona_path: "prompts/system_persona_interview.md"
      answer_template_path: "prompts/answer_template_interview.md"
    evaluation:
      min_citations: 3
      min_unique_docs: 2
      min_avg_score: 0.0
      enforce: false
  - case_id: innovasjon_bokskriving
    description: Skrivehjelp for innovasjonsledelse-boka med artikler og intervju-transkripsjoner i samme case.
    enabled: true
    planner:
      docs_source_types: ["innovasjonsledelse", "immovasjonsfag", "innovasjon_intervju_transcript"]
      prompts_source_types: []
      docs_keywords: ["bok", "kapittel", "manus", "skriv", "skriving", "skrivehjelp", "innovasjonspolitikk", "virkemiddel", "virkemidler", "intervju", "syntese", "drøfting", "analyse", "empiri"]
      prompt_keywords: []
      default_domain: docs
    retrieval:
      top_k_vector: 70
      top_k_lexical: 70
      top_k_final: 16
      max_chunks_per_doc: 4
    prompt_profile:
      system_persona_path: "prompts/system_persona_bokskriving.md"
      answer_template_path: "prompts/answer_template_bokskriving.md"
    evaluation:
      min_citations: 4
      min_unique_docs: 2
      min_avg_score: 0.0
      enforce: false
