version: 1
default_case: dimy_docs
cases:
  - case_id: dimy_docs
    description: Utvikler- og kodeassistent-RAG for CellProtocol, implementerte celler og dokumentert kodebruk.
    enabled: true
    planner:
      docs_source_types: ["haven_docs", "cellprotocol_docs", "prompt_docs"]
      prompts_source_types: []
      docs_keywords: ["api", "endpoint", "kode", "code", "arkitektur", "architecture", "sync", "ingest", "deploy", "database", "cellprotocol", "cell", "skeleton", "configuration", "flow"]
      prompt_keywords: []
      default_domain: docs
    retrieval:
      top_k_vector: 50
      top_k_lexical: 50
      top_k_final: 12
      max_chunks_per_doc: 3
    prompt_profile:
      system_persona_path: "prompts/system_persona_dimy_developer.md"
      answer_template_path: "prompts/answer_template_dimy_developer.md"
    evaluation:
      min_citations: 2
      min_unique_docs: 1
      min_avg_score: 0.0
      enforce: false
  - case_id: dimy_prompts
    description: Brukerrettet verktøy for å sette sammen celler som komponenter og velge riktige byggesteiner.
    enabled: true
    planner:
      docs_source_types: ["prompt_docs"]
      prompts_source_types: ["dimy_prompts"]
      docs_keywords: ["dokumentasjon", "guide", "veiledning", "oversikt", "referanse", "policy"]
      prompt_keywords: ["prompt", "prompts", "system prompt", "template", "mal", "cell", "cells", "celle", "celler", "component", "components", "komponent", "komponenter", "setup", "configuration", "konfigurasjon", "arbeidsrom", "workspace", "skjelett", "skeleton", "sammensette", "sammensetning", "formål", "interesser"]
      default_domain: prompts
    retrieval:
      top_k_vector: 50
      top_k_lexical: 50
      top_k_final: 12
      max_chunks_per_doc: 3
    prompt_profile:
      system_persona_path: "prompts/system_persona_dimy_components.md"
      answer_template_path: "prompts/answer_template_dimy_components.md"
    evaluation:
      min_citations: 2
      min_unique_docs: 1
      min_avg_score: 0.0
      enforce: false
  - case_id: innovasjon
    description: Innovasjonsledelse og innovasjonsfag.
    enabled: true
    planner:
      docs_source_types: ["innovasjonsledelse", "innovasjonsfag"]
      prompts_source_types: []
      docs_keywords: ["policy", "innovation", "innovasjon", "mission", "governance"]
      prompt_keywords: []
      default_domain: docs
    retrieval:
      top_k_vector: 50
      top_k_lexical: 50
      top_k_final: 12
      max_chunks_per_doc: 3
    evaluation:
      min_citations: 2
      min_unique_docs: 1
      min_avg_score: 0.0
      enforce: false
  - case_id: innovasjon_intervjuer
    description: Lederintervjuer for bokprosjektet (kollektiv mening per fast spørsmål).
    enabled: true
    planner:
      docs_source_types: ["innovasjon_intervju_transcript"]
      prompts_source_types: []
      docs_keywords: ["intervju", "leder", "spørsmål", "svar", "kultur", "barriere", "drivkraft", "måling"]
      prompt_keywords: []
      default_domain: docs
    retrieval:
      top_k_vector: 60
      top_k_lexical: 60
      top_k_final: 14
      max_chunks_per_doc: 4
    prompt_profile:
      system_persona_path: "prompts/system_persona_interview.md"
      answer_template_path: "prompts/answer_template_interview.md"
    evaluation:
      min_citations: 3
      min_unique_docs: 2
      min_avg_score: 0.0
      enforce: false
  - case_id: innovasjon_bokskriving
    description: Skrivehjelp for innovasjonsledelse-boka med artikler og intervju-transkripsjoner i samme case.
    enabled: true
    planner:
      docs_source_types: ["innovasjonsledelse", "innovasjonsfag", "innovasjon_intervju_transcript"]
      prompts_source_types: []
      docs_keywords: ["bok", "kapittel", "manus", "skriv", "skriving", "skrivehjelp", "innovasjonspolitikk", "virkemiddel", "virkemidler", "intervju", "syntese", "drøfting", "analyse", "empiri"]
      prompt_keywords: []
      default_domain: docs
    retrieval:
      top_k_vector: 70
      top_k_lexical: 70
      top_k_final: 16
      max_chunks_per_doc: 4
    prompt_profile:
      system_persona_path: "prompts/system_persona_bokskriving.md"
      answer_template_path: "prompts/answer_template_bokskriving.md"
    evaluation:
      min_citations: 4
      min_unique_docs: 2
      min_avg_score: 0.0
      enforce: false
